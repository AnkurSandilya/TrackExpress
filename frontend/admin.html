<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel • TrackExpress</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/jpg" href="favicon.jpg">


  <style>
    .admin-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
    }

    .admin-container input, button {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      font-size: 16px;
    }

    table {
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border: 1px solid #ccc;
    }

    th {
      background: #f5f5f5;
    }

    /* STATUS BADGES */
    .badge {
      padding: 6px 12px;
      border-radius: 20px;
      color: white;
      font-size: 14px;
      font-weight: bold;
      display: inline-block;
    }

    .booked { background: #3498db; }          /* Blue */
    .in-transit { background: #f39c12; }      /* Orange */
    .delivered { background: #2ecc71; }       /* Green */
    .out-for-delivery { background: #9b59b6;} /* Purple */
    .delayed { background: #e74c3c; }         /* Red */

  </style>
</head>
<body>

<div class="admin-container">
  <h2>Add New Parcel</h2>

  <input type="text" id="trackingId" placeholder="Tracking ID">
  <input type="text" id="sender" placeholder="Sender Name">
  <input type="text" id="receiver" placeholder="Receiver Name">
  <input type="text" id="origin" placeholder="Origin City">
  <input type="text" id="destination" placeholder="Destination City">
  <input type="text" id="transit" placeholder="Transit Hubs (comma separated)">
  <input type="text" id="expectedDate" placeholder="Expected Delivery Date (YYYY-MM-DD)">

  <button onclick="addParcel()">Add Parcel</button>

  <hr>

  <h2>All Parcels</h2>
  <table width="100%" id="parcelTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Route</th>
        <th>Status</th>
        <th>Location</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <hr>

  <h2>Update Parcel Status</h2>

  <input type="text" id="updateId" placeholder="Tracking ID">
  <input type="text" id="newLocation" placeholder="Current Location">
  <input type="text" id="newStatus" placeholder="Status (In Transit / Delivered / Delayed)">
  <input type="text" id="updateTime" placeholder="Time (YYYY-MM-DD)">

  <button onclick="updateStatus()">Update Status</button>

  <p id="msg"></p>
</div>

<script src="admin.js"></script>
</body>
</html>
