<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <title>Login • TrackExpress</title>
  <link rel="stylesheet" href="auth.css" />
  <link rel="icon" type="image/jpg" href="favicon.jpg">

</head>
<body>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <h1 class="brand">TrackExpress</h1>
    <img src="https://img.freepik.com/free-vector/people-vector_53876-17373.jpg" class="header-img">
  </div>

  <div class="card">

    <!-- LOGIN SECTION -->
    <div id="loginSection">
      <h2>Welcome back</h2>
      <p class="subtitle">Log in to continue tracking your parcels</p>

      <input type="text" id="loginId" placeholder="User ID">
      <input type="password" id="loginPass" placeholder="Password">

      <button class="primary" onclick="login()">Continue</button>
      <p id="loginMsg" class="msg"></p>

      <p class="switch">
        New here?
        <span onclick="showRegister()">Create an account</span>
      </p>
    </div>

    <!-- REGISTER SECTION -->
    <div id="registerSection" style="display:none;">
      <h2>Create Account</h2>
      <p class="subtitle">Sign up to start tracking parcels</p>

      <input type="text" id="regId" placeholder="Create User ID">
      <input type="password" id="regPass" placeholder="Create Password">

      <button class="secondary" onclick="register()">Create Account</button>
      <p id="regMsg" class="msg"></p>

      <p class="switch">
        Already have an account?
        <span onclick="showLogin()">Login</span>
      </p>
    </div>

  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
