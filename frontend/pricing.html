<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pricing • TrackExpress</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/jpg" href="favicon.jpg">


  <style>
    body {
      background: #f4f6f9;
      font-family: "Poppins", sans-serif;
    }

    .pricing-container {
      max-width: 650px;
      margin: 60px auto;
      padding: 30px;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .pricing-container h2 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 700;
      color: #111;
    }

    .form-group {
      margin-bottom: 18px;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #555;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
      transition: border 0.2s ease;
    }

    input:focus {
      border-color: #ff3b3b;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      background: #ff3b3b;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s ease;
    }

    button:hover {
      background: #e53232;
    }

    .result-box {
      margin-top: 25px;
      padding: 20px;
      background: #f9fafb;
      border-radius: 10px;
      border: 1px solid #eee;
      display: none;
    }

    .result-box h3 {
      margin-bottom: 15px;
      font-size: 18px;
      color: #222;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 15px;
      color: #444;
    }

    .result-row strong {
      color: #000;
    }

    .autocomplete-items {
      position: absolute;
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      max-height: 150px;
      overflow-y: auto;
      width: 100%;
      z-index: 1000;
    }

    .autocomplete-items div {
      padding: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .autocomplete-items div:hover {
      background: #f1f1f1;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">TrackExpress</div>
  <ul class="nav-links">
    <li><a href="booking.html">Manage Booking</a></li>
    <li><a href="pricing.html">Pricing</a></li>
    <li><a href="about.html">About Us</a></li>
    <li><a href="support.html">Support</a></li>
  </ul>
</nav>

<div class="pricing-container">
  <h2>Courier Price Estimator</h2>

  <div class="form-group">
    <label>Source City</label>
    <input type="text" id="source" placeholder="Start typing city name">
    <div id="source-list" class="autocomplete-items"></div>
  </div>

  <div class="form-group">
    <label>Destination City</label>
    <input type="text" id="destination" placeholder="Start typing city name">
    <div id="dest-list" class="autocomplete-items"></div>
  </div>

  <div class="form-group">
    <label>Package Weight (kg)</label>
    <input type="number" id="weight" placeholder="Enter weight in kilograms">
  </div>

  <button onclick="calculatePrice()">Calculate Estimate</button>

  <div class="result-box" id="resultBox">
    <h3>Estimated Details</h3>
    <div class="result-row">
      <span>Distance</span>
      <strong id="distance"></strong>
    </div>
    <div class="result-row">
      <span>Estimated Price</span>
      <strong>₹ <span id="price"></span></strong>
    </div>
    <div class="result-row">
      <span>Delivery Time</span>
      <strong id="time"></strong>
    </div>
  </div>
</div>

<script>
const cities = [
  "Delhi","Mumbai","Kolkata","Chennai","Bangalore","Hyderabad","Pune","Ahmedabad",
  "Jaipur","Lucknow","Bhopal","Patna","Chandigarh","Kochi","Guwahati","Bhubaneswar",
  "Indore","Nagpur","Surat","Visakhapatnam"
];

const distanceMap = {
  "Delhi-Mumbai": 1400,
  "Delhi-Chennai": 2200,
  "Delhi-Bangalore": 2150,
  "Delhi-Kolkata": 1500,
  "Mumbai-Chennai": 1330,
  "Mumbai-Bangalore": 980,
  "Mumbai-Kolkata": 2050,
  "Chennai-Bangalore": 350,
  "Hyderabad-Bangalore": 570,
  "Hyderabad-Chennai": 630,
  "Kolkata-Guwahati": 1000,
  "Delhi-Jaipur": 280,
  "Delhi-Lucknow": 550
};

function getDistance(a, b) {
  if (a === b) return 0;
  const key1 = `${a}-${b}`;
  const key2 = `${b}-${a}`;
  return distanceMap[key1] || distanceMap[key2] || 1200;
}

function autocomplete(inputId, listId) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);

  input.addEventListener("input", function() {
    const value = this.value.toLowerCase();
    list.innerHTML = "";
    if (!value) return;

    cities.forEach(city => {
      if (city.toLowerCase().includes(value)) {
        const div = document.createElement("div");
        div.textContent = city;
        div.onclick = () => {
          input.value = city;
          list.innerHTML = "";
        };
        list.appendChild(div);
      }
    });
  });
}

autocomplete("source", "source-list");
autocomplete("destination", "dest-list");

function calculatePrice() {
  const source = document.getElementById("source").value;
  const destination = document.getElementById("destination").value;
  const weight = parseFloat(document.getElementById("weight").value);

  if (!source || !destination || !weight) {
    alert("Please fill all fields");
    return;
  }

  const distance = getDistance(source, destination);
  const base = 50;
  const price = base + (distance * 0.5) + (weight * 20);

  let time;
  if (distance < 500) time = "2-3 days";
  else if (distance < 1500) time = "3-5 days";
  else time = "5-7 days";

  document.getElementById("distance").innerText = distance + " km";
  document.getElementById("price").innerText = Math.round(price);
  document.getElementById("time").innerText = time;
  document.getElementById("resultBox").style.display = "block";
}
</script>

</body>
</html>
